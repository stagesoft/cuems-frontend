<!-- wrapper always in DOM, CDK maintains state -->
<div
  #dragRef="cdkDrag"
  cdkDrag
  cdkDragBoundary="body"
  (cdkDragEnded)="onDragEnded($event)"
  class="fixed top-0 left-0 z-[9997]"
  [class.pointer-events-none]="collapsed()"
  [class.opacity-0]="collapsed()"
  [class.invisible]="collapsed()">
  <div class="relative">
    <div
      cdkDragHandle
      class="absolute top-2 right-2 flex items-center gap-2 z-10 cursor-grab active:cursor-grabbing">
      <span class="text-muted-light hover:text-gray-100 select-none">⠿</span>
      <button
        type="button"
        class="btn btn-small btn-muted"
        (click)="toggle(); $event.stopPropagation()">
        <app-icon icon="chevronDown" />
      </button>
    </div>
    <app-play-controls-panel />
  </div>
</div>

<!-- collapsed: fixed bottom-right, always independent -->
@if (collapsed()) {
  <div class="fixed bottom-4 right-4 z-[9998] flex items-center gap-2">
    <app-play-controls-bar />
    <button type="button" class="btn btn-small btn-muted" (click)="toggle()">
      <app-icon icon="chevronUp" />
    </button>
  </div>
}
